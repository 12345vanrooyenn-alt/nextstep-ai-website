  <style>
    .not-found {
      min-height: 100vh;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      position: relative;
      overflow: hidden;
    }
    .not-found::before {
      content: '';
      position: absolute;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 800px; height: 600px;
      background: radial-gradient(ellipse, rgba(14,165,233,0.07) 0%, transparent 65%);
      pointer-events: none;
    }
    .nf-inner {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }
    .nf-code {
      font-family: var(--font-head);
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, rgba(14,165,233,0.15) 0%, rgba(14,165,233,0.04) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0;
      position: relative;
    }
    .nf-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      font-family: var(--font-head);
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--sky) 0%, #38bdf8 60%, #7dd3fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.18;
      filter: blur(18px);
    }
    .nf-heading {
      font-family: var(--font-head);
      font-size: clamp(24px, 3.5vw, 36px);
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.015em;
      line-height: 1.15;
      margin: 16px 0 14px;
    }
    .nf-sub {
      font-size: 16px;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .nf-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .nf-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(14,165,233,0.08);
      border: 1px solid rgba(14,165,233,0.2);

      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(14,165,233,0.8);

    .nf-dot {

      border-radius: 50%;
