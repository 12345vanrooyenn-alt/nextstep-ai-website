<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story — Nextstep AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    .scaler {
      position: fixed;
      top: 0; left: 0;
      width: 1080px;
      height: 1920px;
      transform-origin: top left;
    }

    /* Full-bleed photo */
    .photo {
      position: absolute;
      inset: 0;
    }
    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 5%;
      display: block;
    }

    /* Dark gradients top + bottom */
    .fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 600px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
    }
    .fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 900px;
      background: linear-gradient(to top, rgba(6,12,26,0.97) 0%, rgba(6,12,26,0.6) 55%, transparent 100%);
    }

    /* Content */
    .top-bar {
      position: absolute;
      top: 72px; left: 72px; right: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-n {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 28px; color: #fff;
      box-shadow: 0 0 32px rgba(14,165,233,0.5);
    }
    .logo-word {
      font-family: 'Syne', sans-serif;
      font-size: 30px; font-weight: 700; color: #fff;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .logo-word span { color: #0ea5e9; }

    .live-badge {
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 12px 26px;
    }
    .live-dot {
      width: 10px; height: 10px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 10px #22c55e;
    }
    .live-text {
      font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.85);
    }

    /* Bottom content */
    .bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 72px 96px;
    }

    .role-chip {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(14,165,233,0.15);
      border: 1px solid rgba(14,165,233,0.35);
      border-radius: 40px;
      padding: 12px 28px;
      margin-bottom: 32px;
    }
    .chip-dot { width: 8px; height: 8px; background: #0ea5e9; border-radius: 50%; }
    .chip-label {
      font-size: 20px; font-weight: 600; color: #0ea5e9;
      letter-spacing: 0.07em; text-transform: uppercase;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: 104px;
      font-weight: 800;
      color: #fff;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: 28px;
    }

    .titles {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 56px;
    }
    .title-line {
      display: flex; align-items: center; gap: 16px;
    }
    .title-bar {
      width: 4px; height: 28px;
      background: linear-gradient(to bottom, #0ea5e9, #38bdf8);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .title-text {
      font-size: 28px; font-weight: 500; color: rgba(255,255,255,0.65);
      letter-spacing: 0.01em;
    }
    .title-text strong { color: #fff; font-weight: 600; }

    .divider-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(14,165,233,0.4), rgba(14,165,233,0.05));
      margin-bottom: 48px;
    }

    .tagline {
      font-family: 'Syne', sans-serif;
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-bottom: 52px;
    }
    .tagline span { color: #0ea5e9; }

    .url-row {
      display: flex; align-items: center; gap: 16px;
    }
    .url-dot { width: 8px; height: 8px; background: rgba(14,165,233,0.5); border-radius: 50%; }
    .url-text { font-size: 22px; color: rgba(255,255,255,0.3); letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="scaler" id="scaler">

    <div class="photo">
      <img src="assets/caleb-headshot.jpg" alt="Caleb van Rooyen" />
    </div>
    <div class="fade-top"></div>
    <div class="fade-bottom"></div>

    <!-- Top logo -->
    <div class="top-bar">
      <div class="logo">
        <div class="logo-n">N</div>
        <div class="logo-word">Nextstep<span>AI</span></div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <div class="live-text">Building</div>
      </div>
    </div>

    <!-- Bottom text -->
    <div class="bottom">
      <div class="role-chip">
        <div class="chip-dot"></div>
        <div class="chip-label">Founder &amp; CEO</div>
      </div>

      <div class="name">Caleb<br/>van Rooyen</div>

      <div class="titles">
        <div class="title-line">
          <div class="title-bar"></div>
          <div class="title-text"><strong>AI Workflow Architect</strong></div>
        </div>
        <div class="title-line">
          <div class="title-bar"></div>
          <div class="title-text">Cape Town, South Africa</div>
        </div>
      </div>

      <div class="divider-line"></div>

      <div class="tagline">
        Helping clothing brands stop<br/>bleeding revenue —<br/><span>one automation at a time.</span>
      </div>

      <div class="url-row">
        <div class="url-dot"></div>
        <div class="url-text">nextstepai.com</div>
      </div>
    </div>

  </div>

  <script>
    function scale() {
      var s = document.getElementById('scaler');
      var sx = window.innerWidth / 1080;
      var sy = window.innerHeight / 1920;
      var sc = Math.min(sx, sy);
      s.style.transform = 'scale(' + sc + ')';
      s.style.left = ((window.innerWidth - 1080 * sc) / 2) + 'px';
      s.style.top = ((window.innerHeight - 1920 * sc) / 2) + 'px';
    }
    scale();
    window.addEventListener('resize', scale);
  </script>
</body>
</html>
