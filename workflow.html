  <style>
    /* ─── Workflow Detail Page ─── */
    .wd-hero {
      padding: 140px 0 64px;
      text-align: center;
      background: linear-gradient(180deg, rgba(14,165,233,0.06) 0%, transparent 60%);
    }
    .wd-hero .section-label { display: inline-block; margin-bottom: 16px; }
    .wd-hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--white);
      margin-bottom: 16px;
    }
    .wd-hero-meta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .wd-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid;
    }
    .wd-badge-core { color: #38bdf8; border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.08); }
    .wd-badge-standard { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
    .wd-badge-ultimate { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); }
    .wd-badge-cat { color: var(--gray-300); border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); }

    .wd-section {
      padding: 64px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .wd-section:last-of-type { border-bottom: none; }
    .wd-section h2 {
      font-family: var(--font-heading);
      font-size: clamp(1.4rem, 2.5vw, 1.8rem);
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--white);
      margin-bottom: 20px;
    }
    .wd-section p, .wd-section li {
      color: var(--gray-300);
      font-size: 16px;
      line-height: 1.7;
    }

    .wd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-top: 32px;
    }
    @media (max-width: 768px) { .wd-grid { grid-template-columns: 1fr; } }

    .wd-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px;
    }
    .wd-card h3 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--sky);
      margin-bottom: 12px;
    }
    .wd-card p { color: var(--gray-300); line-height: 1.7; }

    .wd-steps {
      list-style: none;
      padding: 0;
      counter-reset: step;
    }
    .wd-steps li {
      counter-increment: step;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .wd-steps li:last-child { border-bottom: none; }
    .wd-steps li::before {
      content: counter(step);
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(14,165,233,0.12);
      color: var(--sky);
      font-weight: 700;
      font-size: 14px;
      border: 1px solid rgba(14,165,233,0.2);
    }

    .wd-scenario {
      background: rgba(14,165,233,0.05);
      border: 1px solid rgba(14,165,233,0.15);
      border-radius: 16px;
      padding: 32px;
      margin-top: 16px;
    }
    .wd-scenario p { color: var(--gray-300); line-height: 1.7; }

    .wd-cta-section {
      padding: 96px 0;
      text-align: center;
    }
    .wd-cta-section h2 {
      font-family: var(--font-heading);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--white);
      margin-bottom: 16px;
    }
    .wd-cta-section p {
      color: var(--gray-400);
      max-width: 520px;
      margin: 0 auto 32px;
    }
    .wd-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gray-400);
      font-weight: 500;
      margin-top: 24px;
      transition: color var(--trans);
    }
    .wd-back:hover { color: var(--white); }

    .wd-meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .wd-meta-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px 20px;
    }
    .wd-meta-item .wd-meta-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray-500);
      margin-bottom: 4px;
    }
    .wd-meta-item .wd-meta-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
    }

    /* 404-style fallback */
    .wd-not-found {
      padding: 200px 0;
      text-align: center;
    }
    .wd-not-found h1 {
      font-family: var(--font-heading);
      font-size: 2rem;
      color: var(--white);
      margin-bottom: 16px;
    }
    .wd-not-found p {
      color: var(--gray-400);
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

  <div id="workflowContent"></div>

  <script src="workflows-data.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var wf = window.WORKFLOWS.find(function(w) { return w.id === id; });
      var container = document.getElementById('workflowContent');

      if (!wf) {
        container.innerHTML =
          '<div class="wd-not-found container">' +
            '<h1>Workflow Not Found</h1>' +
            '<p>The workflow you\'re looking for doesn\'t exist or may have been moved.</p>' +
            '<a href="workflows.html" class="btn btn-primary">Browse All Workflows</a>' +
          '</div>';
        return;
      }

      /* Update page title */
      document.title = wf.name + ' — Nextstep AI';
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.content = wf.shortDesc;

      /* Category display names */
      var catNames = {
        'cart-recovery': 'Cart & Checkout Recovery',
        'reactivation': 'Reactivation & Winback',
        'dm-automation': 'DM & Social Automation',
        'support': 'Support & Post-Purchase',
        'product-performance': 'Product Performance',
        'vip-flows': 'VIP & Loyalty Flows',
        'dashboards': 'Dashboards & Reporting',
        'launch-flows': 'Launch & Drop Flows'
      };

      /* Plan badge class */
      var planClass = 'wd-badge-' + wf.plan;
      var planLabel = wf.plan === 'core' ? 'Core VIP' :
                      wf.plan === 'standard' ? 'Standard VIP' : 'Ultimate VIP';

      /* Build meta items */
      var metaHtml = '';
      if (wf.trigger) metaHtml += '<div class="wd-meta-item"><div class="wd-meta-label">Trigger</div><div class="wd-meta-value">' + wf.trigger + '</div></div>';
      if (wf.channel) metaHtml += '<div class="wd-meta-item"><div class="wd-meta-label">Channel</div><div class="wd-meta-value">' + wf.channel + '</div></div>';
      if (wf.result) metaHtml += '<div class="wd-meta-item"><div class="wd-meta-label">Result</div><div class="wd-meta-value">' + wf.result + '</div></div>';
      metaHtml += '<div class="wd-meta-item"><div class="wd-meta-label">Plan</div><div class="wd-meta-value">' + planLabel + '</div></div>';

      /* Build steps */
      var stepsHtml = '';
      wf.howItWorks.forEach(function(step) {
        stepsHtml += '<li><span>' + step + '</span></li>';
      });

      container.innerHTML =
        /* HERO */
        '<section class="wd-hero">' +
          '<div class="container">' +
            '<div class="section-label">' + (catNames[wf.category] || wf.category) + '</div>' +
            '<h1>' + wf.name + '</h1>' +
            '<p style="color:var(--gray-300);max-width:640px;margin:0 auto;font-size:17px;line-height:1.7;">' + wf.shortDesc + '</p>' +
            '<div class="wd-hero-meta">' +
              '<span class="wd-badge ' + planClass + '">' + planLabel + '</span>' +
              '<span class="wd-badge wd-badge-cat">' + (catNames[wf.category] || wf.category) + '</span>' +
            '</div>' +
            '<div class="wd-meta-grid">' + metaHtml + '</div>' +
          '</div>' +
        '</section>' +

        /* PROBLEM + BEST USE CASE */
        '<section class="wd-section">' +
          '<div class="container">' +
            '<div class="wd-grid">' +
              '<div class="wd-card">' +
                '<h3>Problem This Solves</h3>' +
                '<p>' + wf.problem + '</p>' +
              '</div>' +
              '<div class="wd-card">' +
                '<h3>Best Use Case</h3>' +
                '<p>' + wf.bestUseCase + '</p>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</section>' +

        /* ROI */
        '<section class="wd-section">' +
          '<div class="container">' +
            '<h2>Expected ROI</h2>' +
            '<p>' + wf.roi + '</p>' +
          '</div>' +
        '</section>' +

        /* HOW IT WORKS */
        '<section class="wd-section">' +
          '<div class="container">' +
            '<h2>How It Works</h2>' +
            '<ol class="wd-steps">' + stepsHtml + '</ol>' +
          '</div>' +
        '</section>' +

        /* EXAMPLE SCENARIO */
        '<section class="wd-section">' +
          '<div class="container">' +
            '<h2>Example Scenario</h2>' +
            '<div class="wd-scenario"><p>' + wf.exampleScenario + '</p></div>' +
          '</div>' +
        '</section>' +

        /* CTA */
        '<section class="wd-cta-section">' +
          '<div class="container">' +
            '<h2>Ready to Deploy This Workflow?</h2>' +
            '<p>We build, test, and launch this automation for your brand — fully done for you.</p>' +
            '<a href="qualify.html" class="btn btn-primary btn-lg">Get Started</a>' +
            '<br/>' +
            '<a href="workflows.html" class="wd-back">← Back to All Workflows</a>' +
          '</div>' +
        '</section>';
    })();
  </script>
  <script src="ui.js"></script>
